name: Compilar CV a PDF

on:
  push:
    branches: [ main ]
    paths:
      - 'cv.tex'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Compilar LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex

      - name: Commit del PDF al repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f cv.pdf
          git diff --staged --quiet || git commit -m "📄 PDF actualizado automáticamente"
          git push
