<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi CV — Vista Previa</title>
    <!-- Evitar caché -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Nunito+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito Sans', sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: #16213e;
            border-bottom: 2px solid #c0392b;
            flex-wrap: wrap;
            gap: 12px;
        }

        .topbar h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 22px;
        }
        .topbar h1 span { color: #c0392b; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: transform .15s, box-shadow .15s;
        }
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0,0,0,.3);
        }
        .btn-download { background: #c0392b; color: #fff; }
        .btn-github  { background: #fff; color: #1a1a2e; }
        .btn-group   { display: flex; gap: 10px; flex-wrap: wrap; }

        .pdf-container {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 24px;
        }

        .pdf-container iframe {
            width: 100%;
            max-width: 900px;
            height: calc(100vh - 110px);
            border: none;
            border-radius: 8px;
            box-shadow: 0 8px 40px rgba(0,0,0,.4);
        }

        .mobile-fallback {
            display: none;
            text-align: center;
            padding: 60px 24px;
            max-width: 500px;
            margin: 0 auto;
        }
        .mobile-fallback p {
            font-size: 16px;
            opacity: .8;
            margin-bottom: 24px;
            line-height: 1.6;
        }
        .mobile-fallback .icon { font-size: 64px; margin-bottom: 16px; }

        @media (max-width: 768px) {
            .pdf-container iframe { display: none; }
            .mobile-fallback { display: block; }
            .topbar { padding: 14px 18px; }
            .topbar h1 { font-size: 18px; }
        }
    </style>
</head>
<body>

    <div class="topbar">
        <h1>📄 Mi <span>CV</span></h1>
        <div class="btn-group">
            <a id="downloadBtn" href="cv.pdf" download class="btn btn-download">
                ⬇ Descargar PDF
            </a>
            <a href="https://github.com/pirple123-ctrl/mi-cv" target="_blank" class="btn btn-github">
                ⭐ Ver repositorio
            </a>
        </div>
    </div>

    <div class="pdf-container">
        <!-- CACHE_BUSTER se reemplaza en el workflow con un timestamp único -->
        <iframe id="pdfViewer" src="cv.pdf?v=CACHE_BUSTER"></iframe>

        <div class="mobile-fallback">
            <div class="icon">📄</div>
            <p>La vista previa no está disponible en móviles. Descárgalo directamente:</p>
            <a href="cv.pdf" download class="btn btn-download" style="font-size:16px; padding:14px 32px;">
                ⬇ Descargar CV en PDF
            </a>
        </div>
    </div>

</body>
</html>
